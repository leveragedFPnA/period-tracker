<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    button { background: black; color: white; border: none; }
    li { margin: 5px 0; }
    .card { padding: 10px; border: 1px solid #ddd; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Period Tracker</h2>

<input type="date" id="dateInput">
<button onclick="addDate()">Add Date</button>

<div class="card">
  <h3>Dates</h3>
  <ul id="dateList"></ul>
</div>

<div class="card">
  <h3>Prediction</h3>
  <p id="prediction">Add at least 2 dates</p>
</div>

<script src="app.js"></script>

</body>
</html>
